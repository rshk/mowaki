uvicorn = "^0.13.4"
graphql-server = {version = "^3.0.0b3", allow-prereleases = true}

[tool.poetry.dev-dependencies]
ipython = "^7.21.0"
pytest = "^6.2.2"
pytest-cov = "^2.11.1"
