authors = ["Samuele Santi <samuele@samuelesanti.com>"]
license = "BSD"

[tool.poetry.dependencies]
python = "^3.7"
aiohttp = "^3.7.4"
psycopg2 = "^2.8.6"
SQLAlchemy = "^1.3.23"
alembic = "^1.5.6"
bcrypt = "^3.2.0"
nicelog = "^0.3"
PyJWT = "^2.0.1"
pytz = "^2021.1"
redis = "^3.5.3"
